<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300" role="img" aria-label="Ягодичный мостик">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef2ff"/>
      <stop offset="1" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#g)"/>

  <!-- абстрактная фигура (силуэт спортсмена) -->
  <g fill="none" stroke="#6366f1" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.85">
    <circle cx="200" cy="95" r="22" fill="#4f46e5"/>
    <path d="M200 120 L200 195 M200 140 L155 165 M200 140 L245 165 M200 195 L165 250 M200 195 L235 250"/>
  </g>

  <!-- иконка гантели -->
  <g transform="translate(285,225) rotate(-20)" fill="#4f46e5">
    <rect x="-30" y="-7" width="60" height="14" rx="4"/>
    <rect x="-38" y="-14" width="10" height="28" rx="3"/>
    <rect x="28" y="-14" width="10" height="28" rx="3"/>
  </g>

  <!-- подпись -->
  <text x="20" y="285" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#1e1b4b">Ягодичный мостик</text>
</svg>